name: URL Content Extraction — Cleanup

on:
  schedule:
    # Every 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'supabase>=2.3.0' 'requests>=2.31.0' 'python-dotenv>=1.0.0'

      - name: Delete expired jobs + requeue stale
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WORKER_URL:   ${{ secrets.URL_CONTENT_WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.URL_CONTENT_WORKER_TOKEN }}
          LOG_LEVEL:    INFO
        run: |
          python -m src.functions.url_content_extraction_service.scripts.cleanup_expired_jobs_cli \
            --service url_content_extraction \
            --requeue-stale \
            --stale-queued-seconds 120 \
            --stale-running-seconds 600 \
            --max-attempts 3
