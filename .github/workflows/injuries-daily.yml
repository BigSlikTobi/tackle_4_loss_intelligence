name: Load NFL Injuries (Daily)

on:
  schedule:
    # Run daily at 6:00 PM ET = 10:00 PM UTC (during regular season)
    # This timing ensures injury reports are updated after practice (typically released Wed-Fri)
    - cron: '0 22 * * *'

  workflow_dispatch:  # Allow manual triggers
    inputs:
      season:
        description: 'Season year (e.g., 2025) — leave empty for auto-detect'
        required: false
      week:
        description: 'Week number — leave empty for auto-detect'
        required: false
      season_type:
        description: 'Season type (pre, reg, post) — leave empty for auto-detect'
        required: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  load-injuries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/functions/data_loading/requirements.txt

      - name: Load injury reports
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.season }}" ]; then
            ARGS="$ARGS --season ${{ github.event.inputs.season }}"
          fi
          if [ -n "${{ github.event.inputs.week }}" ]; then
            ARGS="$ARGS --week ${{ github.event.inputs.week }}"
          fi
          if [ -n "${{ github.event.inputs.season_type }}" ]; then
            ARGS="$ARGS --season-type ${{ github.event.inputs.season_type }}"
          fi

          echo "Running: injuries_cli.py $ARGS (empty args = auto-detect)"
          python src/functions/data_loading/scripts/injuries_cli.py $ARGS --log-level INFO

      - name: Report status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Injury reports loaded successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Injury reports load failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
