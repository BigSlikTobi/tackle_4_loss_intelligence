name: Facts Realtime

on:
  workflow_dispatch:

concurrency:
  group: facts-realtime
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  process-facts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/functions/url_content_extraction/requirements.txt
          pip install openai>=1.12.0 supabase>=2.3.0 python-dotenv>=1.0.0
          playwright install --with-deps chromium

      - name: Process realtime facts queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python src/functions/url_content_extraction/scripts/realtime_facts_worker.py \
            --limit 10
