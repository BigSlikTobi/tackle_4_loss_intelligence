name: Content Facts Entities Realtime

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: content-facts-entities-realtime
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  process-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/functions/news_extraction/requirements.txt
          pip install -r src/functions/url_content_extraction/requirements.txt
          pip install -r src/functions/knowledge_extraction/requirements.txt
          pip install openai>=1.12.0 supabase>=2.3.0 python-dotenv>=1.0.0
          playwright install --with-deps chromium

      - name: Extract URLs, then content, then facts, then entities
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python src/functions/news_extraction/scripts/extract_news_cli.py \
            --days-back 1 \
            --output-ids-file /tmp/new_url_ids.txt

          if [ -s /tmp/new_url_ids.txt ]; then
            python src/functions/url_content_extraction/scripts/content_batch_processor.py \
              --url-ids-file /tmp/new_url_ids.txt \
              --workers 5 \
              --timeout 45 \
              --output-success-ids-file /tmp/content_ready_ids.txt
          else
            python src/functions/url_content_extraction/scripts/content_batch_processor.py \
              --limit 10 \
              --max-age-hours 24 \
              --workers 5 \
              --timeout 45 \
              --output-success-ids-file /tmp/content_ready_ids.txt
          fi

          if [ ! -s /tmp/content_ready_ids.txt ]; then
            echo "No URLs advanced by content extraction; stopping realtime chain."
            exit 0
          fi

          python src/functions/url_content_extraction/scripts/realtime_facts_worker.py \
            --url-ids-file /tmp/content_ready_ids.txt \
            --output-success-ids-file /tmp/facts_ready_ids.txt

          if [ ! -s /tmp/facts_ready_ids.txt ]; then
            echo "No URLs advanced by fact extraction; stopping realtime chain."
            exit 0
          fi

          python src/functions/knowledge_extraction/scripts/realtime_entities_worker.py \
            --news-url-ids-file /tmp/facts_ready_ids.txt \
            --limit 250
